global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:8000']
  
  - job_name: 'ml-service'
    static_configs:
      - targets: ['ml-service:8000']
  
  - job_name: 'llm-agent'
    static_configs:
      - targets: ['llm-agent:8000']