apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraper-service
  namespace: ai-career-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scraper-service
  template:
    metadata:
      labels:
        app: scraper-service
    spec:
      containers:
      - name: scraper-service
        image: ${ECR_REGISTRY}/ai-career-agent/scraper-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: url
        - name: REDIS_URL
          value: "redis://redis-service:6379/3"
        - name: ENABLE_SCHEDULER
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: scraper-service
  namespace: ai-career-agent
spec:
  selector:
    app: scraper-service
  ports:
    - port: 80
      targetPort: 8000