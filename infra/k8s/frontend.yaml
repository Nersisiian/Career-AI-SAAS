apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ai-career-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ${ECR_REGISTRY}/ai-career-agent/frontend:latest
        ports:
        - containerPort: 8501
        env:
        - name: API_BASE_URL
          value: "http://user-service"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ai-career-agent
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 8501
  type: LoadBalancer