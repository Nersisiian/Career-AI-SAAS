apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: ai-career-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
      - name: ml-service
        image: ${ECR_REGISTRY}/ai-career-agent/ml-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: url
        - name: REDIS_URL
          value: "redis://redis-service:6379/1"
        - name: MODEL_PATH
          value: "/app/models"
        volumeMounts:
        - name: models
          mountPath: /app/models
        - name: data
          mountPath: /app/data
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: models-pvc
      - name: data
        persistentVolumeClaim:
          claimName: data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: ai-career-agent
spec:
  selector:
    app: ml-service
  ports:
    - port: 80
      targetPort: 8000